name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    permissions: write-all
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract Version
        id: version
        run: echo "version=$(grep '^version=' module.prop | cut -d= -f2)" >> $GITHUB_OUTPUT

      - name: Update versionCode
        run: |
          VERSION_CODE=$(date +%s)
          sed -i "s/^versionCode=.*/versionCode=$VERSION_CODE/" module.prop

      - name: Download Binaries
        run: |
          chmod +x scripts/download_bins.sh
          ./scripts/download_bins.sh

      - name: Build Zip
        run: |
          ZIP_NAME="tproxy-bridge-${{ steps.version.outputs.version }}.zip"
          zip -r "$ZIP_NAME" . -x "*.git*" ".github*" "README.md" "LICENSE" "scripts/download_bins.sh" "test*"
          echo "ZIP_PATH=$ZIP_NAME" >> $GITHUB_ENV

      - name: Create Tag
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git tag -f "${{ steps.version.outputs.version }}" -m "Release ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}" --force

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          files: ${{ env.ZIP_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}