name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions: write-all
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Tag from Main
        if: github.ref == 'refs/heads/main'
        id: tag
        run: |
          TAG=$(grep '^version=' module.prop | cut -d= -f2)
          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping creation"
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            git config user.name 'github-actions[bot]'
            git config user.email 'github-actions[bot]@users.noreply.github.com'
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
            echo "Tag $TAG created"
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

      - name: Update versionCode
        run: |
          VERSION_CODE=$(date +%s)
          sed -i "s/^versionCode=.*/versionCode=$VERSION_CODE/" module.prop

      - name: Download Binaries
        run: |
          chmod +x scripts/download_bins.sh
          ./scripts/download_bins.sh

      - name: Build Zip
        run: |
          ZIP_NAME="tproxy-bridge-$(grep '^version=' module.prop | cut -d= -f2).zip"
          zip -r "$ZIP_NAME" . -x "*.git*" ".github*" "README.md" "LICENSE" "scripts/download_bins.sh" "test*"
          echo "ZIP_PATH=$ZIP_NAME" >> $GITHUB_ENV

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v') || steps.tag.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}