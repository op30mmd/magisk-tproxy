name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Binaries
        run: |
          chmod +x scripts/download_bins.sh
          ./scripts/download_bins.sh

      - name: Update module.prop version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG=${github_ref#refs/tags/v}
          sed -i "s/^version=.*/version=v$TAG/" module.prop
          # Extract versionCode from tag if possible or just use date
          VERSION_CODE=$(date +%s)
          sed -i "s/^versionCode=.*/versionCode=$VERSION_CODE/" module.prop
        env:
          github_ref: ${{ github.ref }}

      - name: Build Zip
        run: |
          ZIP_NAME="tproxy-bridge-$(grep '^version=' module.prop | cut -d= -f2).zip"
          zip -r "$ZIP_NAME" . -x "*.git*" ".github*" "README.md" "LICENSE" "scripts/download_bins.sh" "test*"
          echo "ZIP_PATH=$ZIP_NAME" >> $GITHUB_ENV

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
